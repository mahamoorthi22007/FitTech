name: silai_app
description: Silai — AI-powered fashion & tailoring app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies: # Corrected from ddependencies
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  video_player: ^2.8.0
  google_fonts: ^6.1.0
  share_plus: ^10.1.3
  provider: ^6.1.1
